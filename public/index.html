<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>3DChess</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div id="game_wrapper" class="gamewrapper wrapper"></div>
    <div id="sidebar_wrapper" class="sidebarwrapper blur wrapper">
        <h1 class="fixed extra blur">Pass and Play</h1>
        <ol id="sidebar_movelist" class="movelist">
            <li class="move white"><span class="piece">Q</span>@<span class="pos starting">ge4</span> &rarr; <span class="pos">og5</span></li>
            <li class="move black"><span class="piece">Q</span>@<span class="pos">ge4</span> &rarr; <span class="pos">og5</span></li>
        </ol>
        
    </div>
    <div id="hud_wrapper" class="hudwrapper blur wrapper">
        <h1 id="hud_statusbar" class="blur">Your Move</h1>
        <p>First time? Read the <a href="rules/">rules</a>.</p>
    </div>
    <dialog id="dialog" class="dialog">
        <h1 id="dialog_statusbar"></h1>
        <button id="dialog_playagain">Play Again?</button>
    </dialog>
    <script src="dist/main.js"></script>
</body>
</html>
