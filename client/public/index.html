<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>3DChess</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap">

    <link as="fetch" crossorigin="anonymous" href="static/Pawn.stl" rel="preload" type="application/stl">
    <link as="fetch" crossorigin="anonymous" href="static/Knight.stl" rel="preload" type="application/stl">
    <link as="fetch" crossorigin="anonymous" href="static/Bishop.stl" rel="preload" type="application/stl">
    <link as="fetch" crossorigin="anonymous" href="static/Rook.stl" rel="preload" type="application/stl">
    <link as="fetch" crossorigin="anonymous" href="static/Queen.stl" rel="preload" type="application/stl">
    <link as="fetch" crossorigin="anonymous" href="static/King.stl" rel="preload" type="application/stl">

    <link as="image" crossorigin="anonymous" href="static/px_blur.png" rel="preload" type="image/png">
    <link as="image" crossorigin="anonymous" href="static/nx_blur.png" rel="preload" type="image/png">
    <link as="image" crossorigin="anonymous" href="static/py_blur.png" rel="preload" type="image/png">
    <link as="image" crossorigin="anonymous" href="static/ny_blur.png" rel="preload" type="image/png">
    <link as="image" crossorigin="anonymous" href="static/pz_blur.png" rel="preload" type="image/png">
    <link as="image" crossorigin="anonymous" href="static/nz_blur.png" rel="preload" type="image/png">
</head>
<body>
    <div id="game_wrapper" class="gamewrapper"></div>
    <div id="sidebar_wrapper" class="sidebarwrapper blur wrapper">
        <div class="fixed extra blur header">
            <h1 class="content">Pass and Play</h1>
            <input id="fen6box" class="databox" placeholder="FEN6" aria-label="Board position string">
        </div>
        <ol id="sidebar_movelist" class="movelist">
        </ol>
        
    </div>
    <div id="hud_wrapper" class="hudwrapper blur wrapper">
        <h1 id="hud_statusbar" class="blur header">Your Move</h1>
        <p class="content">First time? Read the <a href="rules">rules</a>.</p>
    </div>
    <dialog id="dialog" class="dialog">
        <h1 id="dialog_statusbar"></h1>
        <button id="dialog_playagain">Play Again?</button>
    </dialog>
    <script src="dist/main.js"></script>
</body>
</html>
